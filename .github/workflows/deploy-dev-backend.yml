name: Deploy Backend DEV (Cloud Run)

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      ref:
        description: "Rama o ref a desplegar (default: develop)"
        required: false
        default: "develop"

permissions:
  contents: read
  id-token: write

concurrency:
  group: pymes-deploy-dev-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_REGION: us-central1
      GCP_PROJECT_ID: pymes-dev-352318
      ARTIFACT_REGISTRY: pymes
      IMAGE_NAME: pymes-core
      SERVICE_NAME: pymes-core
      CLOUD_RUN_SERVICE_ACCOUNT: 884236221349-compute@developer.gserviceaccount.com
      WIF_PROVIDER: projects/884236221349/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
      WIF_SERVICE_ACCOUNT: github-actions@pymes-dev-352318.iam.gserviceaccount.com
      FIREBASE_HOSTING_SITE_ID: pymes-dev-352318
      CLOUDSQL_INSTANCE: new-nexus-dev:us-central1:nexus-db-dev
      JWKS_URL: https://selected-tick-48.clerk.accounts.dev/.well-known/jwks.json
      JWT_ISSUER: https://selected-tick-48.clerk.accounts.dev
      REVIEW_URL: https://nexus-review-396554427884.us-central1.run.app
      SECRET_DATABASE_URL_NAME: DATABASE_URL
      SECRET_CLERK_SECRET_KEY_NAME: CLERK_SECRET_KEY
      SECRET_REVIEW_API_KEY_NAME: REVIEW_API_KEY
      SECRET_JWT_ISSUER_NAME: CLERK_JWT_ISSUER
      AUTH_ENABLE_JWT: "true"
      AUTH_ALLOW_API_KEY: "true"
      NOTIFICATION_BACKEND: noop

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Stage backend build context
        run: |
          set -euo pipefail
          build_root="${RUNNER_TEMP}/pymes-backend-build"
          rm -rf "$build_root"
          mkdir -p "$build_root/pymes"
          rsync -a \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'ai/.venv/' \
            ./ "$build_root/pymes/"
          echo "BUILD_ROOT=$build_root" >> "$GITHUB_ENV"

      - name: Build y push imagen
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker build -f "${BUILD_ROOT}/pymes/pymes-core/backend/Dockerfile.prod" -t "$image_uri" "$BUILD_ROOT"
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"

      - name: Resolve existing AI URL
        run: |
          set -euo pipefail
          ai_service="${{ vars.CLOUD_RUN_SERVICE_AI_DEV || 'pymes-ai' }}"
          ai_url="$(gcloud run services describe "$ai_service" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)' 2>/dev/null || true)"
          echo "AI_SERVICE_URL_EXISTING=${ai_url}" >> "$GITHUB_ENV"

      - name: Resolve available GCP secrets
        run: |
          set -euo pipefail
          secret_flags="DATABASE_URL=${SECRET_DATABASE_URL_NAME}:latest"
          if gcloud secrets describe "$SECRET_CLERK_SECRET_KEY_NAME" --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
            secret_flags="${secret_flags},CLERK_SECRET_KEY=${SECRET_CLERK_SECRET_KEY_NAME}:latest"
          fi
          jwt_issuer_mode="literal"
          if gcloud secrets describe "$SECRET_REVIEW_API_KEY_NAME" --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
            secret_flags="${secret_flags},REVIEW_API_KEY=${SECRET_REVIEW_API_KEY_NAME}:latest"
          fi
          if gcloud secrets describe "$SECRET_JWT_ISSUER_NAME" --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
            secret_flags="${secret_flags},JWT_ISSUER=${SECRET_JWT_ISSUER_NAME}:latest"
            jwt_issuer_mode="secret"
          fi
          echo "SECRET_FLAGS=$secret_flags" >> "$GITHUB_ENV"
          echo "JWT_ISSUER_MODE=$jwt_issuer_mode" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run (DEV)
        run: |
          set -euo pipefail
          frontend_url="https://${FIREBASE_HOSTING_SITE_ID}.web.app"
          env_vars="ENVIRONMENT=dev,PORT=8080,AUTH_ENABLE_JWT=${AUTH_ENABLE_JWT},AUTH_ALLOW_API_KEY=${AUTH_ALLOW_API_KEY},NOTIFICATION_BACKEND=${NOTIFICATION_BACKEND},FRONTEND_URL=${frontend_url}"
          if [[ -n "${JWKS_URL}" ]]; then
            env_vars="${env_vars},JWKS_URL=${JWKS_URL}"
          fi
          if [[ "${JWT_ISSUER_MODE:-literal}" != "secret" && -n "${JWT_ISSUER}" ]]; then
            env_vars="${env_vars},JWT_ISSUER=${JWT_ISSUER}"
          fi
          if [[ -n "${REVIEW_URL}" ]]; then
            env_vars="${env_vars},REVIEW_URL=${REVIEW_URL}"
          fi
          if [[ -n "${AI_SERVICE_URL_EXISTING:-}" ]]; then
            env_vars="${env_vars},AI_SERVICE_URL=${AI_SERVICE_URL_EXISTING}"
          fi
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --set-env-vars="${env_vars}" \
            --set-secrets="${SECRET_FLAGS}"

      - name: Resolve service URL
        run: |
          set -euo pipefail
          service_url="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "::error::No se pudo resolver status.url del backend."
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"

      - name: Update canonical public URL
        run: |
          set -euo pipefail
          gcloud run services update "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --update-env-vars="PUBLIC_BASE_URL=${SERVICE_URL}"

      - name: Guardrail latest revision + URLs
        run: |
          set -euo pipefail
          service_json="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='json')"
          SERVICE_JSON="$service_json" python3 - <<'PY'
          import json
          import os
          import sys

          svc = json.loads(os.environ["SERVICE_JSON"])
          traffic = svc.get("status", {}).get("traffic", [])
          latest_100 = any(t.get("latestRevision") is True and int(t.get("percent", 0)) == 100 for t in traffic)
          if not latest_100:
              print("ERROR: tráfico no está 100% en latestRevision.")
              sys.exit(1)
          envs = svc.get("spec", {}).get("template", {}).get("spec", {}).get("containers", [{}])[0].get("env", [])
          watched = {"PUBLIC_BASE_URL", "FRONTEND_URL", "AI_SERVICE_URL", "REVIEW_URL"}
          for env in envs:
              name = env.get("name", "")
              value = env.get("value", "")
              if name in watched and value and "---" in value:
                  print(f"ERROR: URL taggeada detectada en {name}={value}")
                  sys.exit(1)
          print("Guardrail OK.")
          PY

      - name: Smoke checks
        run: |
          set -euo pipefail
          for _ in 1 2 3 4 5 6; do
            if curl -fsS "${SERVICE_URL}/readyz" | grep -q '"status":"ready"'; then
              exit 0
            fi
            sleep 10
          done
          echo "::error::Backend readyz no respondió ready."
          exit 1
