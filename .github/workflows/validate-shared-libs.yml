name: validate-shared-libs

# Valida que las últimas versiones publicadas de @devpablocristo/* no rompan
# el build de frontend ni el go.mod de pymes-core. Corre diariamente como
# early-warning ante breaking changes en core/modules. Parte del audit
# core+modules 2026-05-15 (MP-05).

on:
  schedule:
    - cron: "0 12 * * 1-5"  # weekdays 9am Buenos Aires
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
          registry-url: "https://registry.npmjs.org"

      - name: Force latest @devpablocristo/* versions
        run: |
          for pkg in $(node -e "
            const p = require('./package.json');
            const deps = {...p.dependencies, ...p.devDependencies};
            Object.keys(deps).filter(k => k.startsWith('@devpablocristo/')).forEach(k => console.log(k));
          "); do
            echo "::group::Bumping ${pkg}"
            npm install --no-save "${pkg}@latest"
            echo "::endgroup::"
          done

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Force latest core/modules Go modules
        run: |
          # Bumpea todas las deps github.com/devpablocristo/* a "latest" sin commit;
          # si rompe el build, el job falla y nos enteramos antes de release.
          mods=$(go list -m -mod=mod -f '{{ if and (not .Main) (or (eq (slice .Path 0 25) "github.com/devpablocristo/") false) }}{{ .Path }}{{ end }}' all 2>/dev/null || true)
          for mod in ${mods}; do
            echo "::group::Bumping ${mod}"
            go get "${mod}@latest" || echo "::warning::failed to bump ${mod} (maybe untagged)"
            echo "::endgroup::"
          done
          go mod tidy

      - name: Build all packages
        run: go build ./...

      - name: Test
        run: go test ./...
