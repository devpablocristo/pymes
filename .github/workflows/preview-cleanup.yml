name: Preview Cleanup

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Número de PR a limpiar"
        required: true
        type: number

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GCP_REGION: us-central1
  GCP_PROJECT_ID: new-ponti-dev
  FIREBASE_HOSTING_SITE_ID: pymes-preview-dev
  WIF_PROVIDER: ${{ vars.PYMES_STG_WIF_PROVIDER || 'projects/1087442197188/locations/global/workloadIdentityPools/github-actions-pool/providers/github-pymes' }}
  WIF_SERVICE_ACCOUNT: github-actions@new-ponti-dev.iam.gserviceaccount.com
  FIREBASE_TOOLS_VERSION: "13"
  CLOUDSQL_INSTANCE: new-ponti-dev:us-central1:new-ponti-db-dev
  SQL_ADMIN_USER: pymes_preview_admin
  SQL_ADMIN_SECRET: pymes-sql-admin-password-preview

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - name: Cleanup preview resources
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          services=(pymes-core pymes-workshops pymes-professionals pymes-beauty pymes-restaurants pymes-medical)
          for service in "${services[@]}"; do
            gcloud run services delete "${service}-pr-${pr}" --project="$GCP_PROJECT_ID" --region="$GCP_REGION" --quiet >/dev/null 2>&1 || true
          done
          npx --yes "firebase-tools@${FIREBASE_TOOLS_VERSION}" hosting:channel:delete "pr-${pr}" \
            --project "$GCP_PROJECT_ID" \
            --site "$FIREBASE_HOSTING_SITE_ID" \
            --force \
            --non-interactive >/dev/null 2>&1 || true
          db="pymes_preview_pr_${pr}"
          if [[ "$db" =~ ^pymes_preview_pr_[1-9][0-9]*$ ]]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
            curl -fsSL -o /tmp/cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.18.3/cloud-sql-proxy.linux.amd64
            chmod +x /tmp/cloud-sql-proxy
            /tmp/cloud-sql-proxy --address 127.0.0.1 --port 15434 "$CLOUDSQL_INSTANCE" &
            proxy_pid=$!; trap 'kill "$proxy_pid" 2>/dev/null || true' EXIT
            admin_password="$(gcloud secrets versions access latest --secret="$SQL_ADMIN_SECRET" --project="$GCP_PROJECT_ID")"
            export PGPASSWORD="$admin_password"
            for _ in $(seq 1 30); do psql -h 127.0.0.1 -p 15434 -U "$SQL_ADMIN_USER" -d postgres -c 'select 1' >/dev/null 2>&1 && break; sleep 2; done
            psql -h 127.0.0.1 -p 15434 -U "$SQL_ADMIN_USER" -d postgres -c "DROP DATABASE IF EXISTS \"$db\" WITH (FORCE);" >/dev/null 2>&1 || true
          fi
          gcloud secrets delete "pymes-database-url-pr-${pr}" --project="$GCP_PROJECT_ID" --quiet >/dev/null 2>&1 || true
