name: Stack Smoke

on:
  workflow_dispatch:

concurrency:
  group: pymes-stack-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout pymes
        uses: actions/checkout@v4
        with:
          path: pymes

      - name: Checkout nexus
        uses: actions/checkout@v4
        with:
          repository: devpablocristo/nexus
          path: nexus

      - name: Create env file
        working-directory: pymes
        run: |
          cat <<'EOF' > .env
          INTERNAL_SERVICE_TOKEN=local-internal-token
          AUTH_ENABLE_JWT=false
          AUTH_ALLOW_API_KEY=true
          REVIEW_API_KEY=nexus-review-admin-dev-key
          REVIEW_CALLBACK_TOKEN=local-review-callback-token
          EOF

      - name: Build and start stack
        working-directory: pymes
        run: docker compose up -d --build

      - name: Wait for services
        working-directory: pymes
        run: |
          for attempt in $(seq 1 60); do
            cp_status=$(curl -fsS http://127.0.0.1:8100/readyz >/dev/null && echo ok || true)
            prof_status=$(curl -fsS http://127.0.0.1:8181/readyz >/dev/null && echo ok || true)
            work_status=$(curl -fsS http://127.0.0.1:8282/readyz >/dev/null && echo ok || true)
            ai_status=$(curl -fsS http://127.0.0.1:8200/readyz >/dev/null && echo ok || true)
            front_status=$(curl -fsS http://127.0.0.1:5180 >/dev/null && echo ok || true)
            if [ "$cp_status" = "ok" ] && [ "$prof_status" = "ok" ] && [ "$work_status" = "ok" ] && [ "$ai_status" = "ok" ] && [ "$front_status" = "ok" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "stack did not become ready in time" >&2
          docker compose ps
          exit 1

      - name: Smoke API calls
        working-directory: pymes
        run: |
          curl -fsS http://127.0.0.1:8100/healthz
          curl -fsS http://127.0.0.1:8181/healthz
          curl -fsS http://127.0.0.1:8282/healthz
          curl -fsS http://127.0.0.1:8200/healthz
          curl -fsS -H 'X-API-KEY: psk_local_admin' -H 'X-USER-ID: 123' http://127.0.0.1:8100/v1/customers
          curl -fsS -H 'X-API-KEY: psk_local_admin' -H 'X-USER-ID: 123' http://127.0.0.1:8181/v1/teachers/professionals
          curl -fsS -H 'X-API-KEY: psk_local_admin' -H 'X-USER-ID: 123' http://127.0.0.1:8282/v1/auto-repair/vehicles

      - name: Run review notifications E2E
        working-directory: pymes
        env:
          CALLBACK_TIMEOUT_SECONDS: "20"
        run: make e2e-review-notifications

      - name: Print container logs on failure
        if: failure()
        working-directory: pymes
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        working-directory: pymes
        run: docker compose down -v
