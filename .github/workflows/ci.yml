name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pymes-ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pymes-core-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: .deps/core
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Link core for local replaces
        run: ln -sfn "$PWD/.deps/core" ../core
      - name: Verify pymes-core backend
        run: |
          go vet ./pymes-core/backend/...
          go test ./pymes-core/backend/...
          go build ./pymes-core/backend/...

  professionals-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: .deps/core
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Link core for local replaces
        run: ln -sfn "$PWD/.deps/core" ../core
      - name: Verify professionals backend
        run: |
          go vet ./professionals/backend/...
          go test ./professionals/backend/...
          go build ./professionals/backend/...

  workshops-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: .deps/core
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Link core for local replaces
        run: ln -sfn "$PWD/.deps/core" ../core
      - name: Verify workshops backend
        run: |
          go vet ./workshops/backend/...
          go test ./workshops/backend/...
          go build ./workshops/backend/...

  beauty-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: .deps/core
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Link core for local replaces
        run: ln -sfn "$PWD/.deps/core" ../core
      - name: Verify beauty backend
        run: |
          go vet ./beauty/backend/...
          go test ./beauty/backend/...
          go build ./beauty/backend/...

  restaurants-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: .deps/core
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Link core for local replaces
        run: ln -sfn "$PWD/.deps/core" ../core
      - name: Verify restaurants backend
        run: |
          go vet ./restaurants/backend/...
          go test ./restaurants/backend/...
          go build ./restaurants/backend/...

  ai:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: .deps/core
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai/requirements.txt
      - name: Link core for editable installs
        run: |
          ln -sfn "$GITHUB_WORKSPACE/.deps/core" "$GITHUB_WORKSPACE/../core"
          sudo mkdir -p /workspace
          sudo ln -sfn "$GITHUB_WORKSPACE/.deps/core" /workspace/core
      - name: Install AI dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Verify AI service
        run: |
          python -m compileall -q src
          ruff check src
          pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: frontend/.deps/core
      - uses: actions/checkout@v4
        with:
          repository: devpablocristo/modules
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: frontend/.deps/modules
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
