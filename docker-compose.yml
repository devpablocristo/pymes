services:
  review:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/docker/review.Dockerfile.dev
    ports:
      - "18084:8080"
    volumes:
      - ../nexus/v3/review:/workspace/nexus/v3/review
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@review-postgres:5432/nexus_review?sslmode=disable
      NEXUS_API_KEYS: admin=${REVIEW_API_KEY:-nexus-review-admin-dev-key}
      APPROVAL_DEFAULT_TTL: "3600"
      NEXUS_SIGNING_KEY: nexus-dev-signing-key-change-in-production
      REVIEW_CALLBACK_TOKEN: ${REVIEW_CALLBACK_TOKEN:-local-review-callback-token}
      REVIEW_APPROVAL_PENDING_CALLBACK_URLS: http://cp-backend:8080/v1/internal/v1/review-callback
      REVIEW_APPROVAL_RESOLVED_CALLBACK_URLS: http://cp-backend:8080/v1/internal/v1/review-callback,http://ai:8000/v1/internal/review-callback
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      review-postgres:
        condition: service_healthy

  cp-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/pymes-core/backend/Dockerfile.dev
    ports:
      - "8100:8080"
    volumes:
      - ./pymes-core/backend:/workspace/pymes/pymes-core/backend
      - ./pymes-core/shared/backend:/workspace/pymes/pymes-core/shared/backend
      - cp_backend_go_mod:/go/pkg/mod
      - cp_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      # Debe coincidir con el mapeo host 8100:8080, healthcheck y URLs internas (review → cp-backend:8080).
      PORT: "8080"
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      SMTP_HOST: mailhog
      FRONTEND_URL: http://localhost:5180
      PAYMENT_GATEWAY_MODE: demo
      # Aplica SQL embebido en pymes-core/backend/seeds/ tras migrar (org local, demo comercial, etc.)
      PYMES_SEED_DEMO: "false"
      # Tomado de .env (`PYMES_SEED_DEMO_ORG_EXTERNAL_ID`). Debe ser el `external_id` de la org en `orgs` (p. ej. org_... de Clerk).
      # Vacío: cp-backend no recibe org de seed explícita (útil si solo usás org local embebida en seeds).
      PYMES_SEED_DEMO_ORG_EXTERNAL_ID: ${PYMES_SEED_DEMO_ORG_EXTERNAL_ID:-}
      REVIEW_URL: http://review:8080
      # Debe coincidir con REVIEW_CALLBACK_TOKEN del servicio review: sin esto
      # cp-backend no registra `/v1/internal/v1/review-callback` y el E2E falla.
      REVIEW_CALLBACK_TOKEN: ${REVIEW_CALLBACK_TOKEN:-local-review-callback-token}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      review:
        condition: service_healthy

  # `context: ..` se mantiene para reutilizar el mismo layout de build de los servicios.
  frontend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/frontend/Dockerfile.dev
    ports:
      - "5180:5173"
    volumes:
      - ./frontend/package.json:/workspace/pymes/frontend/package.json
      - ./frontend/package-lock.json:/workspace/pymes/frontend/package-lock.json
      - ./frontend/src:/workspace/pymes/frontend/src
      - ./frontend/public:/workspace/pymes/frontend/public
      - ./frontend/index.html:/workspace/pymes/frontend/index.html
      - ./frontend/vite.config.ts:/workspace/pymes/frontend/vite.config.ts
      - ./frontend/tsconfig.json:/workspace/pymes/frontend/tsconfig.json
      - ./frontend/eslint.config.js:/workspace/pymes/frontend/eslint.config.js
      - ./frontend/vendor:/workspace/pymes/frontend/vendor
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:8100
      VITE_PROFESSIONALS_API_URL: http://localhost:8181
      VITE_WORKSHOPS_API_URL: http://localhost:8282
      VITE_BEAUTY_API_URL: http://localhost:8383
      VITE_RESTAURANTS_API_URL: http://localhost:8484
      VITE_MEDICAL_API_URL: http://localhost:8585
      VITE_AI_API_URL: ${VITE_AI_API_URL:-http://localhost:8200}
      # Clerk: definir en .env junto al resto (pk_test_...). Vacío = modo consola con API key.
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
    depends_on:
      - cp-backend

  ai:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/ai/Dockerfile.dev
    ports:
      - "8200:8000"
    volumes:
      - ./ai/src:/workspace/pymes/ai/src
      - ./ai/tests:/workspace/pymes/ai/tests
      - ./ai/pyproject.toml:/workspace/pymes/ai/pyproject.toml
    extra_hosts:
      - "host.docker.internal:host-gateway"

    env_file:
      - .env
    environment:
      AI_ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pymes
      BACKEND_URL: http://host.docker.internal:8100
      PROFESSIONALS_BACKEND_URL: http://host.docker.internal:8181
      WORKSHOPS_BACKEND_URL: http://host.docker.internal:8282
      BEAUTY_BACKEND_URL: http://host.docker.internal:8383
      RESTAURANTS_BACKEND_URL: http://host.docker.internal:8484
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      REVIEW_URL: http://review:8080
      PYTHONPATH: /workspace/pymes/ai
      # Cuando el runtime use proveedor Ollama (misma app, config por env): API desde el contenedor `ai`.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    depends_on:
      cp-backend:
        condition: service_started
      review:
        condition: service_healthy
      work-backend:
        condition: service_started

  # ── Professionals Vertical ──

  prof-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/professionals/backend/Dockerfile.dev
    ports:
      - "8181:8081"
    volumes:
      - ./professionals/backend:/workspace/pymes/professionals/backend
      - ./pymes-core/shared/backend:/workspace/pymes/pymes-core/shared/backend
      - prof_backend_go_mod:/go/pkg/mod
      - prof_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      PORT: 8081
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

  # ── Workshops Vertical ──

  work-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/workshops/backend/Dockerfile.dev
    ports:
      - "8282:8082"
    volumes:
      - ./workshops/backend:/workspace/pymes/workshops/backend
      - ./pymes-core/shared/backend:/workspace/pymes/pymes-core/shared/backend
      - work_backend_go_mod:/go/pkg/mod
      - work_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      PORT: 8082
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
      PYMES_SEED_DEMO: "false"
      PYMES_SEED_DEMO_ORG_EXTERNAL_ID: ${PYMES_SEED_DEMO_ORG_EXTERNAL_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

  # ── Beauty / Salón Vertical ──

  beauty-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/beauty/backend/Dockerfile.dev
    ports:
      - "8383:8083"
    volumes:
      - ./beauty/backend:/workspace/pymes/beauty/backend
      - ./pymes-core/shared/backend:/workspace/pymes/pymes-core/shared/backend
      - beauty_backend_go_mod:/go/pkg/mod
      - beauty_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      PORT: 8083
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

  # ── Restaurants / Bares Vertical ──

  restaurants-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/restaurants/backend/Dockerfile.dev
    ports:
      - "8484:8084"
    volumes:
      - ./restaurants/backend:/workspace/pymes/restaurants/backend
      - ./pymes-core/shared/backend:/workspace/pymes/pymes-core/shared/backend
      - restaurants_backend_go_mod:/go/pkg/mod
      - restaurants_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      PORT: 8084
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

  # ── Medical / Medicina laboral Vertical ──

  medical-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/medical/backend/Dockerfile.dev
    ports:
      - "8585:8085"
    volumes:
      - ./medical/backend:/workspace/pymes/medical/backend
      - ./pymes-core/shared/backend:/workspace/pymes/pymes-core/shared/backend
      - medical_backend_go_mod:/go/pkg/mod
      - medical_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      PORT: 8085
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

volumes:
  cp_backend_go_mod:
  cp_backend_go_build:
  prof_backend_go_mod:
  prof_backend_go_build:
  work_backend_go_mod:
  work_backend_go_build:
  beauty_backend_go_mod:
  beauty_backend_go_build:
  restaurants_backend_go_mod:
  restaurants_backend_go_build:
  medical_backend_go_mod:
  medical_backend_go_build:
