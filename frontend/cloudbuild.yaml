# Cloud Build config para frontend pymes (Vite static + nginx).
# Contexto: raíz del repo pymes/ (para que el Dockerfile vea frontend/).
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - frontend/Dockerfile.prod
      - --build-arg
      - VITE_API_URL=${_VITE_API_URL}
      - --build-arg
      - VITE_AI_API_URL=${_VITE_AI_API_URL}
      - --build-arg
      - VITE_CLERK_PUBLISHABLE_KEY=${_VITE_CLERK_PUBLISHABLE_KEY}
      - --build-arg
      - VITE_API_KEY=${_VITE_API_KEY}
      - -t
      - ${_IMAGE}
      - .
  - name: gcr.io/cloud-builders/docker
    args: [push, '${_IMAGE}']

images:
  - '${_IMAGE}'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _IMAGE: ''
  _VITE_API_URL: ''
  _VITE_AI_API_URL: ''
  _VITE_CLERK_PUBLISHABLE_KEY: ''
  _VITE_API_KEY: ''

timeout: 1200s
