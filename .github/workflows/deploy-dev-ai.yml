name: Deploy AI DEV (Cloud Run)

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      ref:
        description: "Rama o ref a desplegar (default: develop)"
        required: false
        default: "develop"

permissions:
  contents: read
  actions: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pymes-deploy-dev-ai
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      GCP_REGION: us-central1
      GCP_PROJECT_ID: pymes-dev-352318
      ARTIFACT_REGISTRY: pymes
      IMAGE_NAME: pymes-ai
      SERVICE_NAME: pymes-ai
      BACKEND_SERVICE_NAME: pymes-core
      CLOUD_RUN_SERVICE_ACCOUNT: 884236221349-compute@developer.gserviceaccount.com
      WIF_PROVIDER: projects/884236221349/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
      WIF_SERVICE_ACCOUNT: github-actions@pymes-dev-352318.iam.gserviceaccount.com
      CLOUDSQL_INSTANCE: new-nexus-dev:us-central1:nexus-db-dev
      SECRET_DATABASE_URL_NAME: DATABASE_URL
      SECRET_GOVERNANCE_API_KEY_NAME: GOVERNANCE_API_KEY
      AI_LOG_LEVEL: info
      LLM_PROVIDER: gemini
      GEMINI_MODEL: gemini-2.0-flash-lite
      GEMINI_VERTEX_PROJECT: pymes-dev-352318
      GEMINI_VERTEX_LOCATION: us-central1
      JWKS_URL: https://selected-tick-48.clerk.accounts.dev/.well-known/jwks.json
      JWT_ISSUER: https://selected-tick-48.clerk.accounts.dev
      GOVERNANCE_URL: https://nexus-review-396554427884.us-central1.run.app
      AUTH_ALLOW_API_KEY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Resolve deploy SHA
        run: echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Wait for CI success
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 1800))
          while (( SECONDS < deadline )); do
            runs_json="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow "CI" \
              --commit "$DEPLOY_SHA" \
              --event push \
              --json databaseId,status,conclusion \
              --limit 5)"
            parsed="$(RUNS_JSON="$runs_json" python3 - <<'PY'
          import json
          import os

          runs = json.loads(os.environ.get("RUNS_JSON", "[]"))
          if not runs:
              print("missing missing missing")
          else:
              run = runs[0]
              print(run.get("databaseId"), run.get("status"), run.get("conclusion"))
          PY
          )"
            read -r run_id status conclusion <<<"$parsed"
            if [[ "$status" == "completed" ]]; then
              if [[ "$conclusion" == "success" ]]; then
                echo "CI $run_id pasó para $DEPLOY_SHA."
                exit 0
              fi
              echo "::error::CI $run_id terminó con conclusion=$conclusion para $DEPLOY_SHA."
              exit 1
            fi
            echo "Esperando CI para $DEPLOY_SHA (run=${run_id:-missing}, status=${status:-missing})..."
            sleep 15
          done
          echo "::error::Timeout esperando CI para $DEPLOY_SHA."
          exit 1

      - name: Build y push imagen
        run: |
          set -euo pipefail
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${DEPLOY_SHA}"
          docker build -f ai/Dockerfile.prod -t "$image_uri" .
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"
          digest="$(gcloud artifacts docker images describe "$image_uri" --format='value(image_summary.fully_qualified_digest)')"
          if [[ -z "$digest" ]]; then
            echo "::error::No se pudo resolver digest para $image_uri."
            exit 1
          fi
          echo "IMAGE_DIGEST=$digest" >> "$GITHUB_ENV"

      - name: Resolve backend URL
        run: |
          set -euo pipefail
          backend_url="$(gcloud run services describe "$BACKEND_SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$backend_url" ]]; then
            echo "::error::No se pudo resolver status.url del backend."
            exit 1
          fi
          echo "BACKEND_URL=${backend_url}" >> "$GITHUB_ENV"

      - name: Resolve required GCP secrets
        run: |
          set -euo pipefail
          for secret_name in \
            "$SECRET_DATABASE_URL_NAME" \
            "$SECRET_GOVERNANCE_API_KEY_NAME"; do
            if ! gcloud secrets versions access latest \
              --secret="$secret_name" \
              --project="$GCP_PROJECT_ID" >/dev/null; then
              echo "::error::No se pudo acceder al secret requerido $secret_name."
              exit 1
            fi
          done
          secret_flags="DATABASE_URL=${SECRET_DATABASE_URL_NAME}:latest"
          secret_flags="${secret_flags},GOVERNANCE_API_KEY=${SECRET_GOVERNANCE_API_KEY_NAME}:latest"
          echo "SECRET_FLAGS=$secret_flags" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run (DEV)
        run: |
          set -euo pipefail
          env_vars="AI_ENVIRONMENT=development,AI_LOG_LEVEL=${AI_LOG_LEVEL},BACKEND_URL=${BACKEND_URL},LLM_PROVIDER=${LLM_PROVIDER},GEMINI_MODEL=${GEMINI_MODEL},GEMINI_VERTEX_PROJECT=${GEMINI_VERTEX_PROJECT},GEMINI_VERTEX_LOCATION=${GEMINI_VERTEX_LOCATION},AUTH_ALLOW_API_KEY=${AUTH_ALLOW_API_KEY}"
          if [[ -n "${JWKS_URL}" ]]; then
            env_vars="${env_vars},JWKS_URL=${JWKS_URL}"
          fi
          if [[ -n "${JWT_ISSUER}" ]]; then
            env_vars="${env_vars},JWT_ISSUER=${JWT_ISSUER}"
          fi
          if [[ -n "${GOVERNANCE_URL}" ]]; then
            env_vars="${env_vars},GOVERNANCE_URL=${GOVERNANCE_URL}"
          fi
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --set-env-vars="${env_vars}" \
            --set-secrets="${SECRET_FLAGS}"

      - name: Resolve service URL
        run: |
          set -euo pipefail
          service_url="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "::error::No se pudo resolver status.url del servicio AI."
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"

      - name: Guardrail latest revision
        run: |
          set -euo pipefail
          service_json="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='json')"
          SERVICE_JSON="$service_json" python3 - <<'PY'
          import json
          import os
          import sys
          svc = json.loads(os.environ["SERVICE_JSON"])
          status = {item.get("type"): item for item in svc.get("status", {}).get("conditions", [])}
          if status.get("Ready", {}).get("status") != "True":
              print("ERROR: Cloud Run service no esta Ready=True.")
              sys.exit(1)
          latest_created = svc.get("status", {}).get("latestCreatedRevisionName")
          latest_ready = svc.get("status", {}).get("latestReadyRevisionName")
          if latest_created != latest_ready:
              print(f"ERROR: latestCreatedRevisionName ({latest_created}) != latestReadyRevisionName ({latest_ready}).")
              sys.exit(1)
          traffic = svc.get("status", {}).get("traffic", [])
          latest_100 = any(t.get("latestRevision") is True and int(t.get("percent", 0)) == 100 for t in traffic)
          if not latest_100:
              print("ERROR: tráfico no está 100% en latestRevision.")
              sys.exit(1)
          print("Guardrail OK.")
          PY
          latest_ready="$(SERVICE_JSON="$service_json" python3 - <<'PY'
          import json
          import os

          svc = json.loads(os.environ["SERVICE_JSON"])
          print(svc.get("status", {}).get("latestReadyRevisionName", ""))
          PY
          )"
          revision_image="$(gcloud run revisions describe "$latest_ready" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(spec.containers[0].image)')"
          if [[ "$revision_image" != "$IMAGE_DIGEST" ]]; then
            echo "::error::Imagen activa $revision_image no coincide con digest esperado $IMAGE_DIGEST."
            exit 1
          fi

      - name: Smoke checks
        run: |
          set -euo pipefail
          for _ in 1 2 3 4 5 6; do
            if curl -fsS "${SERVICE_URL}/readyz" | grep -q '"status":"ready"'; then
              exit 0
            fi
            sleep 10
          done
          echo "::error::AI readyz no respondió ready."
          exit 1
