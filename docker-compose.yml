services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pymes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  cp-backend:
    build:
      context: .
      dockerfile: ./control-plane/backend/Dockerfile.dev
      additional_contexts:
        saas-core: ../saas-core
    ports:
      - "8100:8080"
    volumes:
      - ./control-plane/backend:/workspace/control-plane/backend
      - ./control-plane/shared/backend:/workspace/control-plane/shared/backend
      - ./pkgs/go-pkg:/workspace/pkgs/go-pkg
      - ../saas-core:/saas-core
      - cp_backend_go_mod:/go/pkg/mod
      - cp_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      SMTP_HOST: mailhog
      FRONTEND_URL: http://localhost:5180
      PAYMENT_GATEWAY_MODE: demo
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.dev
    ports:
      - "5180:5173"
    volumes:
      - ./frontend/src:/workspace/frontend/src
      - ./frontend/public:/workspace/frontend/public
      - ./frontend/index.html:/workspace/frontend/index.html
      - ./frontend/vite.config.ts:/workspace/frontend/vite.config.ts
      - ./frontend/tsconfig.json:/workspace/frontend/tsconfig.json
      - ./pkgs/ts-pkg:/workspace/pkgs/ts-pkg
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:8100
      VITE_PROFESSIONALS_API_URL: http://localhost:8181
      VITE_WORKSHOPS_API_URL: http://localhost:8282
    depends_on:
      - cp-backend

  ai:
    build:
      context: .
      dockerfile: ./ai/Dockerfile.dev
      additional_contexts:
        ai-core: ../ai-core
    ports:
      - "8200:8000"
    volumes:
      - ./ai/src:/workspace/ai/src
      - ./control-plane/shared/ai:/workspace/control-plane/shared/ai
      - ../ai-core:/workspace/ai-core

    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pymes
      BACKEND_URL: http://cp-backend:8080
      PROFESSIONALS_BACKEND_URL: http://prof-backend:8081
      WORKSHOPS_BACKEND_URL: http://work-backend:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      - cp-backend
      - work-backend

  # ── Professionals Vertical ──

  prof-backend:
    build:
      context: .
      dockerfile: ./professionals/backend/Dockerfile.dev
      additional_contexts:
        saas-core: ../saas-core
    ports:
      - "8181:8081"
    volumes:
      - ./professionals/backend:/workspace/professionals/backend
      - ./control-plane/shared/backend:/workspace/control-plane/shared/backend
      - ./pkgs/go-pkg:/workspace/pkgs/go-pkg
      - ../saas-core:/saas-core
      - prof_backend_go_mod:/go/pkg/mod
      - prof_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      PORT: 8081
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      CONTROL_PLANE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_started

  # ── Workshops Vertical ──

  work-backend:
    build:
      context: .
      dockerfile: ./workshops/backend/Dockerfile.dev
      additional_contexts:
        saas-core: ../saas-core
    ports:
      - "8282:8082"
    volumes:
      - ./workshops/backend:/workspace/workshops/backend
      - ./control-plane/shared/backend:/workspace/control-plane/shared/backend
      - ./pkgs/go-pkg:/workspace/pkgs/go-pkg
      - ../saas-core:/saas-core
      - work_backend_go_mod:/go/pkg/mod
      - work_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      PORT: 8082
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      CONTROL_PLANE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_started

volumes:
  pgdata:
  cp_backend_go_mod:
  cp_backend_go_build:
  prof_backend_go_mod:
  prof_backend_go_build:
  work_backend_go_mod:
  work_backend_go_build:
