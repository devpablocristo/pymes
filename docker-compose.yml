services:
  # Axis Nexus no va en este compose: levantalo en ../axis (`make up` en ese repo).
  # GOVERNANCE_URL debe usar host.docker.internal y el mismo puerto host que NEXUS_PORT en ../axis/.env (típico 18084).
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pymes
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pymes"]
      interval: 5s
      timeout: 3s
      retries: 30

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  cp-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/core/backend/Dockerfile.dev
    ports:
      - "8100:8080"
    volumes:
      - ./core/backend:/workspace/pymes/core/backend
      - ./core/shared/backend:/workspace/pymes/core/shared/backend
      - cp_backend_go_mod:/go/pkg/mod
      - cp_backend_go_build:/root/.cache/go-build
    env_file:
      - path: .env
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Debe coincidir con el mapeo host 8100:8080 y con NEXUS_PORT publicado por Axis Nexus en el host.
      PORT: "8080"
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      SMTP_HOST: mailhog
      FRONTEND_URL: http://localhost:5180
      # URL pública del backend que el browser puede alcanzar. Lo usamos para
      # construir el `redirect_url` de invitations Clerk: el ticket viaja al
      # backend para procesarse server-side via FAPI y luego redirigir al frontend.
      PUBLIC_BASE_URL: http://localhost:8100
      PAYMENT_GATEWAY_MODE: demo
      # Aplica SQL embebido en core/backend/seeds/ tras migrar (org local, demo comercial, etc.)
      PYMES_SEED_DEMO: "false"
      # Tomado de .env (`PYMES_SEED_DEMO_ORG_EXTERNAL_ID`). Debe ser el `external_id` de la org en `tenants` (p. ej. org_... de Clerk).
      # Vacío: cp-backend no recibe org de seed explícita (útil si solo usás org local embebida en seeds).
      PYMES_SEED_DEMO_ORG_EXTERNAL_ID: ${PYMES_SEED_DEMO_ORG_EXTERNAL_ID:-}
      GOVERNANCE_URL: ${GOVERNANCE_URL:-http://host.docker.internal:18084}
      # Coincidir con GOVERNANCE_CALLBACK_TOKEN del governance en Nexus.
      GOVERNANCE_CALLBACK_TOKEN: ${GOVERNANCE_CALLBACK_TOKEN:-local-nexus-callback-token}
      # Endpoint interno de Axis Companion para inbound WhatsApp y adapters IA.
      COMPANION_INTERNAL_URL: ${COMPANION_INTERNAL_URL:-http://host.docker.internal:18085}
      COMPANION_API_KEY: ${COMPANION_API_KEY:-companion-admin-dev-key}
      COMPANION_INTERNAL_JWT_SECRET: ${COMPANION_INTERNAL_JWT_SECRET:-axis-dev-internal-jwt-secret-change-me}
      COMPANION_INTERNAL_JWT_ISSUER: ${COMPANION_INTERNAL_JWT_ISSUER:-axis-bff}
      COMPANION_INTERNAL_JWT_AUDIENCE: ${COMPANION_INTERNAL_JWT_AUDIENCE:-companion}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started

  # `context: ..` se mantiene para reutilizar el mismo layout de build de los servicios.
  ui:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/ui/Dockerfile.dev
    ports:
      - "5180:5173"
    volumes:
      - ./ui/package.json:/workspace/pymes/ui/package.json
      - ./ui/package-lock.json:/workspace/pymes/ui/package-lock.json
      - ./ui/src:/workspace/pymes/ui/src
      - ./ui/public:/workspace/pymes/ui/public
      - ./ui/index.html:/workspace/pymes/ui/index.html
      - ./ui/vite.config.ts:/workspace/pymes/ui/vite.config.ts
      - ./ui/tsconfig.json:/workspace/pymes/ui/tsconfig.json
      - ./ui/eslint.config.js:/workspace/pymes/ui/eslint.config.js
      - ./ui/vendor:/workspace/pymes/ui/vendor
    env_file:
      - path: .env
        required: false
    environment:
      VITE_API_URL: http://localhost:8100
      VITE_PROFESSIONALS_API_URL: http://localhost:8181
      VITE_WORKSHOPS_API_URL: http://localhost:8282
      VITE_BEAUTY_API_URL: http://localhost:8383
      VITE_RESTAURANTS_API_URL: http://localhost:8484
      VITE_MEDICAL_API_URL: http://localhost:8585
      # Clerk: definir en .env junto al resto (pk_test_...). Vacío = modo consola con API key.
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
      VITE_API_KEY: ${VITE_API_KEY:-psk_local_admin}
      VITE_API_ACTOR: ${VITE_API_ACTOR:-local-admin}
      VITE_API_ROLE: ${VITE_API_ROLE:-admin}
      VITE_API_SCOPES: ${VITE_API_SCOPES:-admin:console:read,admin:console:write}
    depends_on:
      - cp-backend

  # ── Chat IA servido por Axis Companion. Para levantarlo localmente:
  # docker compose --project-directory ../axis -f ../axis/docker-compose.yml up companion.

  # ── Professionals Vertical ──

  prof-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/professionals/backend/Dockerfile.dev
    ports:
      - "8181:8081"
    volumes:
      - ./professionals/backend:/workspace/pymes/professionals/backend
      - ./core/shared/backend:/workspace/pymes/core/shared/backend
      - prof_backend_go_mod:/go/pkg/mod
      - prof_backend_go_build:/root/.cache/go-build
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 8081
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

  # ── Workshops Vertical ──

  work-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/workshops/backend/Dockerfile.dev
    ports:
      - "8282:8082"
    volumes:
      - ./workshops/backend:/workspace/pymes/workshops/backend
      - ./core/shared/backend:/workspace/pymes/core/shared/backend
      - work_backend_go_mod:/go/pkg/mod
      - work_backend_go_build:/root/.cache/go-build
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 8082
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
      PYMES_SEED_DEMO: "false"
      PYMES_SEED_DEMO_ORG_EXTERNAL_ID: ${PYMES_SEED_DEMO_ORG_EXTERNAL_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

  # ── Beauty / Salón Vertical ──

  beauty-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/beauty/backend/Dockerfile.dev
    ports:
      - "8383:8083"
    volumes:
      - ./beauty/backend:/workspace/pymes/beauty/backend
      - ./core/shared/backend:/workspace/pymes/core/shared/backend
      - beauty_backend_go_mod:/go/pkg/mod
      - beauty_backend_go_build:/root/.cache/go-build
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 8083
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

  # ── Restaurants / Bares Vertical ──

  restaurants-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/restaurants/backend/Dockerfile.dev
    ports:
      - "8484:8084"
    volumes:
      - ./restaurants/backend:/workspace/pymes/restaurants/backend
      - ./core/shared/backend:/workspace/pymes/core/shared/backend
      - restaurants_backend_go_mod:/go/pkg/mod
      - restaurants_backend_go_build:/root/.cache/go-build
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 8084
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

  # ── Medical / Medicina laboral Vertical ──

  medical-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: pymes/medical/backend/Dockerfile.dev
    ports:
      - "8585:8085"
    volumes:
      - ./medical/backend:/workspace/pymes/medical/backend
      - ./core/shared/backend:/workspace/pymes/core/shared/backend
      - medical_backend_go_mod:/go/pkg/mod
      - medical_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      PORT: 8085
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

volumes:
  postgres_data:
  cp_backend_go_mod:
  cp_backend_go_build:
  prof_backend_go_mod:
  prof_backend_go_build:
  work_backend_go_mod:
  work_backend_go_build:
  beauty_backend_go_mod:
  beauty_backend_go_build:
  restaurants_backend_go_mod:
  restaurants_backend_go_build:
  medical_backend_go_mod:
  medical_backend_go_build:
