# Cloud Build config para backend pymes-core.
# Contexto: parent dir con pymes/ y core/ hermanos.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - pymes/pymes-core/backend/Dockerfile.prod
      - -t
      - ${_IMAGE}
      - .
  - name: gcr.io/cloud-builders/docker
    args: [push, '${_IMAGE}']

images:
  - '${_IMAGE}'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _IMAGE: ''

timeout: 1200s
