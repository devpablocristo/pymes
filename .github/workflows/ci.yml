name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pymes-ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pymes-core-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify pymes-core backend
        run: |
          go vet ./pymes-core/backend/...
          go test ./pymes-core/backend/...
          go build ./pymes-core/backend/...

  professionals-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify professionals backend
        run: |
          go vet ./professionals/backend/...
          go test ./professionals/backend/...
          go build ./professionals/backend/...

  workshops-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify workshops backend
        run: |
          go vet ./workshops/backend/...
          go test ./workshops/backend/...
          go build ./workshops/backend/...

  beauty-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify beauty backend
        run: |
          go vet ./beauty/backend/...
          go test ./beauty/backend/...
          go build ./beauty/backend/...

  restaurants-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify restaurants backend
        run: |
          go vet ./restaurants/backend/...
          go test ./restaurants/backend/...
          go build ./restaurants/backend/...

  medical-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify medical backend
        run: |
          go vet ./medical/backend/...
          go test ./medical/backend/...
          go build ./medical/backend/...

  ai:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # El runner no tiene .env; Settings valida Gemini al importar módulos durante pytest.
    env:
      GEMINI_API_KEY: ci-placeholder-not-used
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai/requirements-dev.txt
      - name: Install AI dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt
      - name: Verify AI service
        run: |
          python -m compileall -q src
          ruff check src
          python -c "import src.main"
          pytest -q

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # Build-time env (opcional): definir en GitHub → Settings → Secrets and variables → Actions.
      # Si quedan vacíos en PR/forks, el bundle usa los mismos defaults que un build local sin .env.
      # Para dev hosting (misma origin + rewrites en firebase.json) suele bastar dejar URLs vacías;
      # verticals/AI pueden necesitar secrets *_DEV si no van por proxy.
      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_DEV }}
          VITE_AI_API_URL: ${{ secrets.VITE_AI_API_URL_DEV }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_DEV }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY_DEV }}
          VITE_API_ACTOR: ${{ secrets.VITE_API_ACTOR_DEV }}
          VITE_API_ROLE: ${{ secrets.VITE_API_ROLE_DEV }}
          VITE_API_SCOPES: ${{ secrets.VITE_API_SCOPES_DEV }}
          VITE_PROFESSIONALS_API_URL: ${{ secrets.VITE_PROFESSIONALS_API_URL_DEV }}
          VITE_WORKSHOPS_API_URL: ${{ secrets.VITE_WORKSHOPS_API_URL_DEV }}
          VITE_BEAUTY_API_URL: ${{ secrets.VITE_BEAUTY_API_URL_DEV }}
          VITE_RESTAURANTS_API_URL: ${{ secrets.VITE_RESTAURANTS_API_URL_DEV }}
        run: npm run build

      # Hosting DEV: solo en merge/push a `develop` vía `.github/workflows/deploy-dev-frontend.yml`
      # (WIF + smoke). No desplegar DEV desde pushes a `main`.

  audits:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run architecture audits
        run: |
          make audit-debt
          make audit-crud-strict

  docker-prod-builds:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build production backend image
        run: docker build -f pymes-core/backend/Dockerfile.prod -t pymes-core-prod-ci ..
      - name: Build production AI image
        run: docker build -f ai/Dockerfile.prod -t pymes-ai-prod-ci .
      - name: Smoke AI production image imports
        run: docker run --rm -e GEMINI_API_KEY=ci-placeholder-not-used pymes-ai-prod-ci python -c "import src.main"

  governance-notifications-e2e:
    name: governance-notifications-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # El E2E real (Docker + callback Nexus→cp-backend) solo en workflow_dispatch: en PR compartidos no es estable.
    # El job sigue ejecutándose en pull_request con un paso no-op para que los checks requeridos no queden "Skipped".
    needs:
      - pymes-core-backend
    permissions:
      contents: read
    steps:
      - name: Omitir E2E en pull_request (check requerido en verde)
        if: github.event_name != 'workflow_dispatch'
        run: |
          echo "::notice::governance-notifications E2E no corre en PR; ejecutar Actions → CI → Run workflow para el stack completo."

      - name: Checkout pymes
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          path: pymes

      - name: Checkout nexus
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          repository: devpablocristo/nexus
          path: nexus

      - name: Create env file
        if: github.event_name == 'workflow_dispatch'
        working-directory: pymes
        run: |
          cat <<'EOF' > .env
          INTERNAL_SERVICE_TOKEN=local-internal-token
          AUTH_ENABLE_JWT=false
          AUTH_ALLOW_API_KEY=true
          GOVERNANCE_ADMIN_API_KEY=governance-admin-dev-key
          GOVERNANCE_API_KEY=governance-admin-dev-key
          GOVERNANCE_CALLBACK_TOKEN=local-governance-callback-token
          GOVERNANCE_URL=http://host.docker.internal:18084
          EOF

      - name: Start Nexus governance (compose repo nexus)
        if: github.event_name == 'workflow_dispatch'
        working-directory: nexus
        run: |
          export GOVERNANCE_APPROVAL_PENDING_CALLBACK_URLS=http://host.docker.internal:8100/v1/internal/v1/governance-callback
          export GOVERNANCE_APPROVAL_RESOLVED_CALLBACK_URLS=http://host.docker.internal:8100/v1/internal/v1/governance-callback,http://host.docker.internal:8200/v1/internal/governance-callback
          export GOVERNANCE_CALLBACK_TOKEN=local-governance-callback-token
          docker compose up -d --build governance governance-postgres

      - name: Build and start cp-backend (compose Pymes)
        if: github.event_name == 'workflow_dispatch'
        working-directory: pymes
        env:
          LOCAL_INFRA_DIR: ${{ github.workspace }}/pymes/.github/ci-infra
        run: |
          docker compose \
            --project-directory "$(pwd)" \
            -f "$LOCAL_INFRA_DIR/docker-compose.yml" \
            -f docker-compose.yml \
            up -d --build cp-backend

      - name: Wait for governance and cp-backend
        if: github.event_name == 'workflow_dispatch'
        working-directory: pymes
        env:
          LOCAL_INFRA_DIR: ${{ github.workspace }}/pymes/.github/ci-infra
        run: |
          for attempt in $(seq 1 60); do
            governance_status=$(curl -fsS http://127.0.0.1:18084/readyz >/dev/null && echo ok || true)
            cp_status=$(curl -fsS http://127.0.0.1:8100/healthz >/dev/null && echo ok || true)
            if [ "$governance_status" = "ok" ] && [ "$cp_status" = "ok" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "governance/cp-backend did not become ready in time" >&2
          docker compose \
            --project-directory "$(pwd)" \
            -f "$LOCAL_INFRA_DIR/docker-compose.yml" \
            -f docker-compose.yml \
            ps
          exit 1

      - name: Load core seeds (needed to have an ORG_ID for the E2E)
        if: github.event_name == 'workflow_dispatch'
        working-directory: pymes
        env:
          LOCAL_INFRA_DIR: ${{ github.workspace }}/pymes/.github/ci-infra
          NEXUS_ROOT: ${{ github.workspace }}/nexus
          PYMES_SEED_DEMO_ORG_EXTERNAL_ID: org_e2e_test
          PYMES_SEED_DEMO_ORG_NAME: "E2E Test Org"
        run: |
          # El E2E sólo necesita la org semilla. Los seeds de verticales requieren
          # que esos backends hayan aplicado sus propias migraciones, cosa que no
          # pasa acá porque la stack de E2E sólo levanta Nexus governance + cp-backend de Pymes.
          # Cargamos únicamente los seeds que dependen de pymes-core.
          source scripts/seeds/lib.sh
          ensure_seed_dbs_ready
          require_seed_org_external_id
          TARGET_ORG_UUID="$(resolve_target_org_uuid)"
          SEED_ORG_EXTERNAL_ID="${PYMES_SEED_DEMO_ORG_EXTERNAL_ID}"
          SEED_ORG_NAME="${PYMES_SEED_DEMO_ORG_NAME:-Pymes Demo Org}"
          SEED_ORG_SLUG="${PYMES_SEED_DEMO_ORG_SLUG:-$(derive_seed_org_slug "$SEED_ORG_EXTERNAL_ID")}"
          export TARGET_ORG_UUID SEED_ORG_EXTERNAL_ID SEED_ORG_NAME SEED_ORG_SLUG

          for sql_file in \
            "pymes-core/backend/seeds/01_clerk_prereqs.sql" \
            "pymes-core/backend/seeds/03_rbac.sql"
          do
            run_pymes_sql_file "$sql_file"
          done

      - name: Resolve ORG_ID for E2E
        if: github.event_name == 'workflow_dispatch'
        working-directory: pymes
        env:
          LOCAL_INFRA_DIR: ${{ github.workspace }}/pymes/.github/ci-infra
        run: |
          ORG_ID="$(docker compose \
            --project-directory "$(pwd)" \
            -f "$LOCAL_INFRA_DIR/docker-compose.yml" \
            -f docker-compose.yml \
            exec -T postgres \
            psql -U postgres -d pymes -Atq -c "SELECT id FROM tenants WHERE external_id='org_e2e_test'")"
          ORG_ID="$(printf '%s' "$ORG_ID" | tr -d '[:space:]')"
          if [[ -z "$ORG_ID" ]]; then
            echo "Could not resolve ORG_ID from seeded tenants table" >&2
            exit 1
          fi
          echo "ORG_ID=$ORG_ID" >> "$GITHUB_ENV"

      - name: Debug — governance env + callback connectivity
        if: github.event_name == 'workflow_dispatch'
        working-directory: nexus
        env:
          LOCAL_INFRA_DIR: ${{ github.workspace }}/pymes/.github/ci-infra
        run: |
          set +e
          echo "--- governance env (callback vars) ---"
          docker compose exec -T governance \
            printenv GOVERNANCE_CALLBACK_TOKEN GOVERNANCE_APPROVAL_PENDING_CALLBACK_URLS GOVERNANCE_APPROVAL_RESOLVED_CALLBACK_URLS || true
          echo "--- governance → cp-backend connectivity (expect 401 without token) ---"
          docker compose exec -T governance \
            wget -qSO- http://host.docker.internal:8100/v1/internal/v1/governance-callback --post-data='{}' --header='Content-Type: application/json' 2>&1 | head -20 || true
          echo "--- governance → cp-backend with token ---"
          docker compose exec -T governance \
            wget -qSO- http://host.docker.internal:8100/v1/internal/v1/governance-callback \
              --post-data='{"event":"approval_pending","request_id":"debug"}' \
              --header='Content-Type: application/json' \
              --header='Authorization: Bearer local-governance-callback-token' \
              2>&1 | head -20 || true
          exit 0

      - name: Run governance notifications E2E
        if: github.event_name == 'workflow_dispatch'
        working-directory: pymes
        env:
          LOCAL_INFRA_DIR: ${{ github.workspace }}/pymes/.github/ci-infra
          # Runners compartidos: el callback governance → cp-backend + persistencia en Postgres suele superar 20s.
          CALLBACK_TIMEOUT_SECONDS: "90"
        run: make e2e-governance-notifications

      - name: Print container logs on failure
        if: failure() && github.event_name == 'workflow_dispatch'
        working-directory: pymes
        env:
          LOCAL_INFRA_DIR: ${{ github.workspace }}/pymes/.github/ci-infra
        run: |
          docker compose \
            --project-directory "$(pwd)" \
            -f "$LOCAL_INFRA_DIR/docker-compose.yml" \
            -f docker-compose.yml \
            logs --no-color

      - name: Stop stack
        if: always() && github.event_name == 'workflow_dispatch'
        env:
          LOCAL_INFRA_DIR: ${{ github.workspace }}/pymes/.github/ci-infra
        run: |
          docker compose \
            --project-directory "${{ github.workspace }}/pymes" \
            -f "$LOCAL_INFRA_DIR/docker-compose.yml" \
            -f "${{ github.workspace }}/pymes/docker-compose.yml" \
            down -v || true
          docker compose --project-directory "${{ github.workspace }}/nexus" down -v || true
