name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  control-plane-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Verify control-plane backend
        run: |
          go vet ./control-plane/backend/...
          go test ./control-plane/backend/...
          go build ./control-plane/backend/...

  professionals-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Verify professionals backend
        run: |
          go vet ./professionals/backend/...
          go test ./professionals/backend/...
          go build ./professionals/backend/...

  ai:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai/requirements.txt
      - name: Install AI dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Verify AI service
        run: |
          python -m compileall -q src
          pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
