services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pymes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    restart: unless-stopped
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  cp-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./pymes/pymes-core/backend/Dockerfile.dev
    ports:
      - "8100:8080"
    volumes:
      - ./pymes-core/backend:/workspace/pymes/pymes-core/backend
      - ./pymes-core/shared/backend:/workspace/pymes/pymes-core/shared/backend
      - ${CORE_REPO_PATH:-../core}:/workspace/core
      - cp_backend_go_mod:/go/pkg/mod
      - cp_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      SMTP_HOST: mailhog
      FRONTEND_URL: http://localhost:5180
      PAYMENT_GATEWAY_MODE: demo
      # Aplica SQL embebido en pymes-core/backend/seeds/ tras migrar (org local, demo comercial, etc.)
      PYMES_SEED_DEMO: "true"
      # Opcional Clerk dev: descomentá y poné tu org_... (la fila debe existir en `orgs` antes del arranque).
      # PYMES_SEED_DEMO_ORG_EXTERNAL_ID: "org_xxxxxxxx"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.dev
    ports:
      - "5180:5173"
    volumes:
      - ./frontend/src:/workspace/frontend/src
      - ./frontend/public:/workspace/frontend/public
      - ./frontend/index.html:/workspace/frontend/index.html
      - ./frontend/vite.config.ts:/workspace/frontend/vite.config.ts
      - ./frontend/tsconfig.json:/workspace/frontend/tsconfig.json
      - ${CORE_REPO_PATH:-../core}:/workspace/frontend/.deps/core
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:8100
      VITE_PROFESSIONALS_API_URL: http://localhost:8181
      VITE_WORKSHOPS_API_URL: http://localhost:8282
      VITE_BEAUTY_API_URL: http://localhost:8383
      VITE_RESTAURANTS_API_URL: http://localhost:8484
      VITE_AI_API_URL: ${VITE_AI_API_URL:-http://localhost:8200}
      # Clerk: definir en .env junto al resto (pk_test_...). Vacío = modo consola con API key.
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
    depends_on:
      - cp-backend

  ai:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./pymes/ai/Dockerfile.dev
    ports:
      - "8200:8000"
    volumes:
      - ./ai/src:/workspace/ai/src
      - ./pymes-core/shared/ai:/workspace/pymes-core/shared/ai
      - ${CORE_REPO_PATH:-../core}:/workspace/core

    env_file:
      - .env
    environment:
      AI_ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pymes
      BACKEND_URL: http://cp-backend:8080
      PROFESSIONALS_BACKEND_URL: http://prof-backend:8081
      WORKSHOPS_BACKEND_URL: http://work-backend:8082
      BEAUTY_BACKEND_URL: http://beauty-backend:8083
      RESTAURANTS_BACKEND_URL: http://restaurants-backend:8084
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      - cp-backend
      - work-backend

  # ── Professionals Vertical ──

  prof-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./pymes/professionals/backend/Dockerfile.dev
    ports:
      - "8181:8081"
    volumes:
      - ./professionals/backend:/workspace/pymes/professionals/backend
      - ./pymes-core/shared/backend:/workspace/pymes/pymes-core/shared/backend
      - ${CORE_REPO_PATH:-../core}:/workspace/core
      - prof_backend_go_mod:/go/pkg/mod
      - prof_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      PORT: 8081
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

  # ── Workshops Vertical ──

  work-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./pymes/workshops/backend/Dockerfile.dev
    ports:
      - "8282:8082"
    volumes:
      - ./workshops/backend:/workspace/pymes/workshops/backend
      - ./pymes-core/shared/backend:/workspace/pymes/pymes-core/shared/backend
      - ${CORE_REPO_PATH:-../core}:/workspace/core
      - work_backend_go_mod:/go/pkg/mod
      - work_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      PORT: 8082
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
      PYMES_SEED_DEMO: "true"
      # Mismo valor que cp-backend si usás seed Clerk (mismo tenant que el core).
      # PYMES_SEED_DEMO_ORG_EXTERNAL_ID: "org_xxxxxxxx"
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

  # ── Beauty / Salón Vertical ──

  beauty-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./pymes/beauty/backend/Dockerfile.dev
    ports:
      - "8383:8083"
    volumes:
      - ./beauty/backend:/workspace/pymes/beauty/backend
      - ./pymes-core/shared/backend:/workspace/pymes/pymes-core/shared/backend
      - ${CORE_REPO_PATH:-../core}:/workspace/core
      - beauty_backend_go_mod:/go/pkg/mod
      - beauty_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      PORT: 8083
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

  # ── Restaurants / Bares Vertical ──

  restaurants-backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./pymes/restaurants/backend/Dockerfile.dev
    ports:
      - "8484:8084"
    volumes:
      - ./restaurants/backend:/workspace/pymes/restaurants/backend
      - ./pymes-core/shared/backend:/workspace/pymes/pymes-core/shared/backend
      - ${CORE_REPO_PATH:-../core}:/workspace/core
      - restaurants_backend_go_mod:/go/pkg/mod
      - restaurants_backend_go_build:/root/.cache/go-build
    env_file:
      - .env
    environment:
      PORT: 8084
      ENVIRONMENT: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pymes?sslmode=disable
      PYMES_CORE_URL: http://cp-backend:8080
      FRONTEND_URL: http://localhost:5180
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
    depends_on:
      postgres:
        condition: service_healthy
      cp-backend:
        condition: service_healthy

volumes:
  pgdata:
  cp_backend_go_mod:
  cp_backend_go_build:
  prof_backend_go_mod:
  prof_backend_go_build:
  work_backend_go_mod:
  work_backend_go_build:
  beauty_backend_go_mod:
  beauty_backend_go_build:
  restaurants_backend_go_mod:
  restaurants_backend_go_build:
