name: Stack Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  smoke-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: |
          cat <<'EOF' > .env
          INTERNAL_SERVICE_TOKEN=local-internal-token
          AUTH_ENABLE_JWT=false
          AUTH_ALLOW_API_KEY=true
          EOF

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          for attempt in $(seq 1 60); do
            cp_status=$(curl -fsS http://127.0.0.1:8100/readyz >/dev/null && echo ok || true)
            prof_status=$(curl -fsS http://127.0.0.1:8181/readyz >/dev/null && echo ok || true)
            ai_status=$(curl -fsS http://127.0.0.1:8200/readyz >/dev/null && echo ok || true)
            front_status=$(curl -fsS http://127.0.0.1:5180 >/dev/null && echo ok || true)
            if [ "$cp_status" = "ok" ] && [ "$prof_status" = "ok" ] && [ "$ai_status" = "ok" ] && [ "$front_status" = "ok" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "stack did not become ready in time" >&2
          docker compose ps
          exit 1

      - name: Smoke API calls
        run: |
          curl -fsS http://127.0.0.1:8100/healthz
          curl -fsS http://127.0.0.1:8181/healthz
          curl -fsS http://127.0.0.1:8200/healthz
          curl -fsS -H 'X-API-KEY: psk_local_admin' http://127.0.0.1:8100/v1/customers
          curl -fsS -H 'X-API-KEY: psk_local_admin' http://127.0.0.1:8181/v1/professionals

      - name: Print container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v
