name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pymes-ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pymes-core-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify pymes-core backend
        run: |
          go vet ./pymes-core/backend/...
          go test ./pymes-core/backend/...
          go build ./pymes-core/backend/...

  professionals-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify professionals backend
        run: |
          go vet ./professionals/backend/...
          go test ./professionals/backend/...
          go build ./professionals/backend/...

  workshops-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify workshops backend
        run: |
          go vet ./workshops/backend/...
          go test ./workshops/backend/...
          go build ./workshops/backend/...

  beauty-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify beauty backend
        run: |
          go vet ./beauty/backend/...
          go test ./beauty/backend/...
          go build ./beauty/backend/...

  restaurants-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify restaurants backend
        run: |
          go vet ./restaurants/backend/...
          go test ./restaurants/backend/...
          go build ./restaurants/backend/...

  ai:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          path: core
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai/requirements-dev.txt
      - name: Install AI dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt
      - name: Verify AI service
        env:
          PYTHONPATH: ${{ github.workspace }}/ai:${{ github.workspace }}/core/ai/python/src
        run: |
          python -m compileall -q src
          ruff check src
          pytest -q

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      # core/modules dentro del workspace: vite.config.ts los resuelve vía monorepoPackageDir (anidado o hermano).
      - uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          path: core
      - uses: actions/checkout@v4
        with:
          repository: devpablocristo/modules
          path: modules
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  review-notifications-e2e:
    name: review-notifications-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - pymes-core-backend
    permissions:
      contents: read
    steps:
      - name: Checkout pymes
        uses: actions/checkout@v4
        with:
          path: pymes

      - name: Checkout core
        uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          path: core

      - name: Checkout nexus
        uses: actions/checkout@v4
        with:
          repository: devpablocristo/nexus
          path: nexus

      - name: Create env file
        working-directory: pymes
        run: |
          cat <<'EOF' > .env
          INTERNAL_SERVICE_TOKEN=local-internal-token
          AUTH_ENABLE_JWT=false
          AUTH_ALLOW_API_KEY=true
          REVIEW_API_KEY=nexus-review-admin-dev-key
          REVIEW_CALLBACK_TOKEN=local-review-callback-token
          EOF

      - name: Build and start governance stack
        working-directory: pymes
        run: docker compose up -d --build review cp-backend

      - name: Wait for review and cp-backend
        working-directory: pymes
        run: |
          for attempt in $(seq 1 60); do
            review_status=$(curl -fsS http://127.0.0.1:18084/readyz >/dev/null && echo ok || true)
            cp_status=$(curl -fsS http://127.0.0.1:8100/healthz >/dev/null && echo ok || true)
            if [ "$review_status" = "ok" ] && [ "$cp_status" = "ok" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "review/cp-backend did not become ready in time" >&2
          docker compose ps
          exit 1

      - name: Run review notifications E2E
        working-directory: pymes
        env:
          # Runners compartidos: el callback review → cp-backend + persistencia en Postgres suele superar 20s.
          CALLBACK_TIMEOUT_SECONDS: "90"
        run: make e2e-review-notifications

      - name: Print container logs on failure
        if: failure()
        working-directory: pymes
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        working-directory: pymes
        run: docker compose down -v
